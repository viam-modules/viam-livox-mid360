name: Test

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_and_test:
    strategy:
       matrix:
        include:
          - arch: ubuntu-large
            image: ghcr.io/viamrobotics/rdk-devenv:amd64-cache
            platform: linux/amd64
            label: amd64
          - arch: github-linux-arm64-8core
            image: ghcr.io/viamrobotics/rdk-devenv:arm64-cache
            platform: linux/arm64
            label: arm64
    runs-on: ${{ matrix.arch }}
    container:
      image: ${{ matrix.image }}
    timeout-minutes: 45
    steps:

    - name: Check out main branch code
      if: github.event_name != 'pull_request_target'
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Check out PR branch code
      if: github.event_name == 'pull_request_target'
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: recursive

    - name: Install build deps
      run: |
        apt-get update
        apt-get install -y cmake build-essential

    - name: Build SDK + module
      run: |
        chown -R testbot:testbot .
        sudo -u testbot bash -lc 'make build'

    - name: Run go unit tests
      run: |
        sudo -u testbot bash -lc 'go test -race ./...'
